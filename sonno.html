<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanza del Sonno - La Stanza Interiore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #f8f3ef, #efe4de);
            color: #715d64;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            background: rgba(113, 93, 100, 0.15);
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-moz-range-track {
            background: rgba(113, 93, 100, 0.15);
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -5px;
            background-color: #c0909b;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            background-color: #c0909b;
            border: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body class="p-6">

    <!-- SFONDO SFUMATO IN SOTTOFONDO -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute w-96 h-96 bg-pink-200 rounded-full blur-3xl opacity-20 -top-20 -left-20"></div>
        <div class="absolute w-96 h-96 bg-rose-100 rounded-full blur-3xl opacity-30 bottom-0 right-0"></div>
    </div>

    <!-- HEADER CON TASTO TORNA DIETRO -->
    <header class="relative z-10 max-w-md w-full mx-auto flex items-center justify-start">
        <a href="index.html" class="glass px-5 py-2.5 rounded-full text-xs uppercase tracking-wider font-medium shadow-sm transition active:scale-95 flex items-center gap-2">
            <i class="fa-solid fa-chevron-left"></i> Torna alla Home
        </a>
    </header>

    <!-- CONTAINER CENTRALE -->
    <main class="relative z-10 max-w-md w-full mx-auto glass rounded-[40px] p-8 text-center shadow-2xl my-auto border border-white/40">
        <p class="uppercase tracking-[0.25em] text-[10px] opacity-50 mb-2 font-semibold">RILASSAMENTO PROFONDO</p>
        <h1 class="serif text-4xl text-[#9b7280] mb-8">Stanza del Sonno</h1>
        
        <!-- IMMAGINE DI COPERTINA DELLA STANZA TONDA -->
        <div class="w-44 h-44 mx-auto rounded-full overflow-hidden border-4 border-white/50 shadow-xl mb-8 relative">
            <img src="sonno.jpg" class="w-full h-full object-cover">
        </div>

        <!-- BLOCCO PLAYER CON TIMELINE E TIMER -->
        <div class="flex flex-col items-center justify-center bg-white/20 rounded-3xl p-6 border border-white/20 shadow-inner mb-4">
            
            <!-- CONTROLLO TIMELINE -->
            <div class="w-full px-2 mb-2">
                <input type="range" id="progressBar" min="0" max="100" value="0" class="w-full accent-[#c0909b]">
            </div>

            <!-- CRONOMETRI INFERIORI -->
            <div class="w-full flex justify-between px-2 text-xs opacity-60 mb-6 font-mono font-light">
                <span id="currentTime">00:00</span>
                <span id="trackDuration">--:--</span>
            </div>
            
            <!-- PULSANTE DI RIPRODUZIONE -->
            <button id="playAudioBtn" class="bg-[#c0909b] text-white w-20 h-20 rounded-full text-2xl shadow-xl flex items-center justify-center active:scale-95 transition font-light pl-1">
                <i id="playIcon" class="fa-solid fa-play text-xl"></i>
            </button>
            
            <p id="audioStatus" class="text-[10px] uppercase tracking-widest opacity-60 mt-4">Ascolta la tua guida</p>
        </div>

        <!-- FILE AUDIO INVISIBILE -->
        <audio id="meditationAudio" src="sonno.mp3"></audio>
    </main>

    <div class="h-10 relative z-10"></div>

    <script>
        const audio = document.getElementById('meditationAudio');
        const playBtn = document.getElementById('playAudioBtn');
        const playIcon = document.getElementById('playIcon');
        const status = document.getElementById('audioStatus');
        const trackDuration = document.getElementById('trackDuration');
        const currentTimeDisplay = document.getElementById('currentTime');
        const progressBar = document.getElementById('progressBar');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return m + ":" + s;
        }

        audio.onloadedmetadata = () => {
            trackDuration.innerHTML = formatTime(audio.duration);
            progressBar.max = Math.floor(audio.duration);
        };

        if (audio.readyState >= 1) {
            trackDuration.innerHTML = formatTime(audio.duration);
            progressBar.max = Math.floor(audio.duration);
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play().catch(e => {
                    console.log("Riproduzione bloccata o file mancante:", e);
                    alert("Assicurati di aver inserito il file 'sonno.mp3' nella stessa cartella dell'app!");
                });
                playIcon.className = 'fa-solid fa-pause text-xl';
                playBtn.classList.remove('pl-1');
                status.innerHTML = 'In sessione...';
            } else {
                audio.pause();
                playIcon.className = 'fa-solid fa-play text-xl';
                playBtn.classList.add('pl-1');
                status.innerHTML = 'In pausa';
            }
        };

        audio.ontimeupdate = () => {
            if (!progressBar.classList.contains('seeking')) {
                progressBar.value = Math.floor(audio.currentTime);
            }
            currentTimeDisplay.innerHTML = formatTime(audio.currentTime);
        };

        progressBar.oninput = () => {
            progressBar.classList.add('seeking');
            currentTimeDisplay.innerHTML = formatTime(progressBar.value);
        };

        progressBar.onchange = () => {
            audio.currentTime = progressBar.value;
            progressBar.classList.remove('seeking');
        };

        audio.onended = () => {
            playIcon.className = 'fa-solid fa-play text-xl';
            playBtn.classList.add('pl-1');
            status.innerHTML = 'Pratica conclusa';
            progressBar.value = 0;
            currentTimeDisplay.innerHTML = "00:00";
        };
    </script>
</body>

</html>
