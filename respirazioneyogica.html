<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-49EZT9DGYL"></script>
    <script>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-49EZT9DGYL');

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #f8f3ef, #efe4de);
            color: #715d64;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
    </style>
</head>

<body class="flex flex-col justify-between p-4 sm:p-6 max-w-2xl mx-auto min-h-screen">

    <!-- HEADER / TORNA INDIETRO -->
    <header class="flex items-center justify-between w-full pt-2 pb-4">
        <a href="index.html" class="glass w-12 h-12 rounded-full flex items-center justify-center text-[#715d64] shadow-md hover:scale-105 transition cursor-pointer">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <span class="serif text-xl text-[#b07d89]">La Stanza Interiore</span>
        <div class="w-12"></div> <!-- Spacer per bilanciare l'header -->
    </header>

    <!-- CONTENUTO PRINCIPALE DELLA STANZA -->
    <main class="my-auto py-4">
        <div class="glass rounded-[36px] p-4 sm:p-6 shadow-2xl border border-white/30 text-center flex flex-col items-center">
            
            <p class="uppercase tracking-[0.25em] text-[10px] opacity-60 mb-1 font-semibold text-[#b07d89]">Videolezione Consapevole</p>
            <h1 class="serif text-2xl sm:text-3xl text-[#9a717d] mb-4">Impara a Respirare</h1>

            <!-- PLAYER VIDEO VERTICALE (9:16) -->
            <div class="w-full max-w-xs sm:max-w-sm rounded-[24px] overflow-hidden shadow-xl border border-white/20 bg-black/40 mb-4 aspect-[9/16]">
                <video controls poster="respirazioneyogica.png" class="w-full h-full object-cover">
                    <source src="respirazioneyogica.mp4" type="video/mp4">
                    Il tuo browser non supporta la riproduzione dei video.
                </video>
            </div>

            <p class="text-xs opacity-85 font-light leading-relaxed max-w-md mb-1">
                Prenditi un momento per te. Quando ti senti pronta, fai clic su play per iniziare la lezione guidata alla Respirazione Yogica.
            </p>
        </div>
    </main>

</body>
